# Local dev stack: Postgres+pgvector + the app (API + built frontend).
# For iterating on the frontend, run `npm run dev` separately instead.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: uap
      POSTGRES_PASSWORD: uap
      POSTGRES_DB: uap_archive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uap -d uap_archive"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://uap:uap@db:5432/uap_archive
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      DATA_DIR: /app/data
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
