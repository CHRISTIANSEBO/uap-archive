<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" font-family="Inter, system-ui, sans-serif">
  <defs>
    <style>
      .paper { fill: #0f0e0c; }
      .box { fill: #1a1815; stroke: #35322d; stroke-width: 1.5; rx: 12; }
      .accent { fill: #1a1815; stroke: #e9975e; stroke-width: 1.5; }
      .title { fill: #f2efea; font-size: 15px; font-weight: 600; }
      .sub { fill: #a8a29a; font-size: 12px; }
      .lbl { fill: #6b6660; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; font-family: "JetBrains Mono", monospace; }
      .arrow { stroke: #e9975e; stroke-width: 1.6; fill: none; marker-end: url(#a); }
      .flow { stroke: #35322d; stroke-width: 1.4; fill: none; marker-end: url(#g); }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#e9975e"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#35322d"/></marker>
  </defs>

  <rect class="paper" width="960" height="640"/>
  <text x="32" y="42" class="title" font-size="20">UAP Archive — Architecture</text>
  <text x="32" y="64" class="lbl">Declassified Project Blue Book · search + case cards + map</text>

  <!-- Ingestion column -->
  <text x="32" y="108" class="lbl">Ingestion pipeline (standalone scripts · resumable · cost-guarded)</text>
  <rect class="box" x="32" y="120" width="180" height="72" rx="12"/>
  <text x="46" y="148" class="title">1 · Fetch</text>
  <text x="46" y="168" class="sub">archive.org PDFs</text>
  <text x="46" y="184" class="sub">+ source URLs → /data/raw</text>

  <rect class="box" x="232" y="120" width="180" height="72" rx="12"/>
  <text x="246" y="148" class="title">2 · OCR</text>
  <text x="246" y="168" class="sub">Tesseract per page</text>
  <text x="246" y="184" class="sub">conf &lt;60% → needs_review</text>

  <rect class="box" x="432" y="120" width="180" height="72" rx="12"/>
  <text x="446" y="148" class="title">3 · Structure</text>
  <text x="446" y="168" class="sub">Claude Haiku → JSON</text>
  <text x="446" y="184" class="sub">Pydantic validate · retry 1×</text>

  <rect class="box" x="632" y="120" width="180" height="72" rx="12"/>
  <text x="646" y="148" class="title">4 · Chunk + Embed</text>
  <text x="646" y="168" class="sub">bge-small (local, 384d)</text>
  <text x="646" y="184" class="sub">→ pgvector w/ page cite</text>

  <path class="flow" d="M212,156 L230,156"/>
  <path class="flow" d="M412,156 L430,156"/>
  <path class="flow" d="M612,156 L630,156"/>

  <!-- state + cost -->
  <rect class="accent" x="232" y="220" width="380" height="56" rx="12"/>
  <text x="246" y="244" class="title">pipeline_status (case, stage)</text>
  <text x="246" y="263" class="sub">idempotent ledger — re-runs skip completed work</text>
  <rect class="accent" x="632" y="220" width="180" height="56" rx="12"/>
  <text x="646" y="244" class="title">cost_log</text>
  <text x="646" y="263" class="sub">abort if &gt; $25 budget</text>
  <path class="flow" d="M120,192 L120,248 L230,248"/>
  <path class="flow" d="M522,192 L522,220"/>
  <path class="flow" d="M722,192 L722,220"/>

  <!-- Database -->
  <rect class="box" x="232" y="316" width="496" height="88" rx="12"/>
  <text x="246" y="344" class="title">Postgres + pgvector — single database</text>
  <text x="246" y="366" class="sub">cases · pages · chunks(vector 384) · pipeline_status · cost_log</text>
  <text x="246" y="386" class="sub">metadata AND vectors in one place — simple infra</text>
  <path class="arrow" d="M480,276 L480,314"/>

  <!-- API -->
  <rect class="box" x="232" y="440" width="496" height="80" rx="12"/>
  <text x="246" y="468" class="title">FastAPI (Gunicorn/Uvicorn) — zero LLM calls at request time</text>
  <text x="246" y="490" class="sub">/api/search · /api/case/{id} · /api/random · /api/stats</text>
  <text x="246" y="508" class="sub">embeds query locally → vector search → group by case</text>
  <path class="arrow" d="M480,404 L480,438"/>

  <!-- Frontend -->
  <rect class="box" x="232" y="556" width="496" height="66" rx="12"/>
  <text x="246" y="584" class="title">React + TS + Vite — search · results · case detail</text>
  <text x="246" y="604" class="sub">MapLibre clickable map · skeleton states · Lumen-derived DNA</text>
  <path class="arrow" d="M480,520 L480,554"/>

  <!-- deploy note -->
  <rect class="accent" x="760" y="440" width="168" height="180" rx="12"/>
  <text x="774" y="466" class="lbl">Deploy</text>
  <text x="774" y="490" class="sub">One Docker image</text>
  <text x="774" y="510" class="sub">API serves the</text>
  <text x="774" y="526" class="sub">built SPA + /media</text>
  <text x="774" y="550" class="sub">scans.</text>
  <text x="774" y="578" class="sub">Railway + managed</text>
  <text x="774" y="594" class="sub">Postgres.</text>
  <path class="flow" d="M728,480 L758,480"/>
</svg>
